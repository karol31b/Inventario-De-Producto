<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inventario</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="Daniel y Karol" author="CESDE">
</head>
<body>
    <div class="container" id="loginPage">
        <header class="header-auth">
            <h1>Sistema de Inventario</h1>
        </header>

        <main class="auth-main">
            <!-- Formulario de Login -->
            <form id="formLogin" class="form-auth">
                <h2>Iniciar Sesión</h2>
                <div id="msgLogin"></div>
                <div class="campo">
                    <label for="logEmail">Correo electrónico</label>
                    <input type="email" id="logEmail" required placeholder="tu@correo.com">
                </div>
                <div class="campo">
                    <label for="logPassword">Contraseña</label>
                    <input type="password" id="logPassword" required placeholder="Tu contraseña" minlength="6">
                </div>
                <button type="submit" class="btn btn-principal">Ingresar</button>
                <p class="form-link">¿No tienes cuenta? <a href="#" id="irRegistro">Regístrate aquí</a></p>
            </form>

            <!-- Formulario de Registro -->
            <form id="formRegistro" class="form-auth oculto">
                <h2>Crear Cuenta</h2>
                <div id="msgRegistro"></div>
                <div class="campo">
                    <label for="regEmail">Correo electrónico</label>
                    <input type="email" id="regEmail" required placeholder="tu@correo.com">
                </div>
                <div class="campo">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                <button type="submit" class="btn btn-principal">Registrarse</button>
                <p class="form-link">¿Ya tienes cuenta? <a href="#" id="irLogin">Inicia sesión</a></p>
            </form>
        </main>

        <footer>
            <p><a href="index.html">Volver al inicio</a></p>
        </footer>
    </div>

    <!-- Supabase JS desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/crud.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
